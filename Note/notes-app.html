<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App - Your Digital Notebook</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: calc(100vh - 120px);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .auth-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 400px;
            margin: 0 auto 30px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-weight: 600;
            color: #555;
        }

        .form-group input {
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-secondary {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .notes-section {
            display: none;
        }

        .user-info {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .note-input-area {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .note-input {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 1rem;
            resize: vertical;
            font-family: inherit;
        }

        .note-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .note-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .color-picker {
            display: flex;
            gap: 8px;
        }

        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
        }

        .color-option.active {
            border-color: #333;
            transform: scale(1.1);
        }

        .color-yellow { background: #fff740; }
        .color-orange { background: #ffab40; }
        .color-pink { background: #ff5722; }
        .color-purple { background: #9c27b0; }
        .color-blue { background: #2196f3; }
        .color-green { background: #4caf50; }
        .color-default { background: #f5f5f5; }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .note-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: all 0.3s;
            position: relative;
            word-wrap: break-word;
        }

        .note-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .note-card.pinned::before {
            content: '📌';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.2rem;
        }

        .note-content {
            min-height: 60px;
            margin-bottom: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .note-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .note-date {
            font-size: 0.8rem;
            color: #666;
        }

        .note-buttons {
            display: flex;
            gap: 8px;
        }

        .note-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.3s;
            color: #666;
        }

        .note-btn:hover {
            background: #f0f0f0;
            color: #333;
        }

        .empty-state {
            text-align: center;
            color: white;
            padding: 60px 20px;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .footer {
            background: rgba(0,0,0,0.1);
            color: white;
            padding: 30px 20px;
            margin-top: 50px;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .social-link {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .social-link:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .made-with-love {
            font-size: 1.1rem;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .notes-grid {
                grid-template-columns: 1fr;
            }
            
            .note-controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .social-links {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-sticky-note"></i> Notes App</h1>
            <p>Your personal digital notebook in the cloud</p>
        </div>

        <!-- Auth Section -->
        <div id="authSection" class="auth-section">
            <div id="loginForm" class="auth-form">
                <h2 style="text-align: center; margin-bottom: 20px; color: #333;">Welcome Back!</h2>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <button class="btn btn-primary" onclick="login()">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <button class="btn btn-secondary" onclick="showSignup()">
                    New here? Sign Up
                </button>
            </div>

            <div id="signupForm" class="auth-form" style="display: none;">
                <h2 style="text-align: center; margin-bottom: 20px; color: #333;">Create Account</h2>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="Create a password" required>
                </div>
                <button class="btn btn-primary" onclick="signup()">
                    <i class="fas fa-user-plus"></i> Sign Up
                </button>
                <button class="btn btn-secondary" onclick="showLogin()">
                    Already have account? Login
                </button>
            </div>
        </div>

        <!-- Notes Section -->
        <div id="notesSection" class="notes-section">
            <div class="user-info">
                <div>
                    <i class="fas fa-user"></i> Welcome, <span id="userName">User</span>!
                </div>
                <button class="btn btn-secondary" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>

            <div class="note-input-area">
                <textarea id="noteInput" class="note-input" placeholder="Write your note here..." rows="4"></textarea>
                <div class="note-controls">
                    <div class="color-picker">
                        <div class="color-option color-default active" data-color="default" onclick="selectColor('default')"></div>
                        <div class="color-option color-yellow" data-color="yellow" onclick="selectColor('yellow')"></div>
                        <div class="color-option color-orange" data-color="orange" onclick="selectColor('orange')"></div>
                        <div class="color-option color-pink" data-color="pink" onclick="selectColor('pink')"></div>
                        <div class="color-option color-purple" data-color="purple" onclick="selectColor('purple')"></div>
                        <div class="color-option color-blue" data-color="blue" onclick="selectColor('blue')"></div>
                        <div class="color-option color-green" data-color="green" onclick="selectColor('green')"></div>
                    </div>
                    <button class="btn btn-primary" onclick="addNote()">
                        <i class="fas fa-plus"></i> Add Note
                    </button>
                </div>
            </div>

            <div id="notesContainer" class="notes-grid"></div>
            
            <div id="emptyState" class="empty-state">
                <i class="fas fa-sticky-note"></i>
                <h3>No notes yet</h3>
                <p>Start writing your first note above!</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-content">
            <div class="social-links">
                <a href="mailto:priyanshrajbhar499@gmail.com" class="social-link">
                    <i class="fas fa-envelope"></i> Email
                </a>
                <a href="https://wa.me/919426781890" class="social-link" target="_blank">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>
                <a href="https://x.com/priyansh_86" class="social-link" target="_blank">
                    <i class="fab fa-twitter"></i> Twitter
                </a>
                <a href="https://instagram.com/priyansh__.86" class="social-link" target="_blank">
                    <i class="fab fa-instagram"></i> Instagram
                </a>
                <a href="https://t.me/priyansh_dev" class="social-link" target="_blank">
                    <i class="fab fa-telegram"></i> Telegram
                </a>
            </div>
            <div class="made-with-love">
                Made with ❤️ by Priyansh
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let notes = [];
        let selectedColor = 'default';
        let editingNoteId = null;

        // Color mapping
        const colorMap = {
            default: '#f5f5f5',
            yellow: '#fff740',
            orange: '#ffab40',
            pink: '#ff5722',
            purple: '#9c27b0',
            blue: '#2196f3',
            green: '#4caf50'
        };

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            loadUserData();
            if (currentUser) {
                showNotesSection();
            }
        });

        // Authentication functions
        function showSignup() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'flex';
        }

        function showLogin() {
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'flex';
        }

        function signup() {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;

            if (!name || !email || !password) {
                alert('Please fill all fields');
                return;
            }

            if (password.length < 6) {
                alert('Password must be at least 6 characters long');
                return;
            }

            // Check if user already exists
            const existingUsers = JSON.parse(localStorage.getItem('notesApp_users') || '[]');
            if (existingUsers.some(user => user.email === email)) {
                alert('User with this email already exists');
                return;
            }

            // Create new user
            const newUser = {
                id: Date.now().toString(),
                name: name,
                email: email,
                password: password, // In real app, this should be hashed
                createdAt: new Date().toISOString()
            };

            existingUsers.push(newUser);
            localStorage.setItem('notesApp_users', JSON.stringify(existingUsers));

            alert('Account created successfully! Please login.');
            showLogin();
        }

        function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                alert('Please fill all fields');
                return;
            }

            const users = JSON.parse(localStorage.getItem('notesApp_users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if (!user) {
                alert('Invalid email or password');
                return;
            }

            currentUser = user;
            localStorage.setItem('notesApp_currentUser', JSON.stringify(user));
            showNotesSection();
        }

        function logout() {
            currentUser = null;
            notes = [];
            localStorage.removeItem('notesApp_currentUser');
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('notesSection').style.display = 'none';
            showLogin();
        }

        function showNotesSection() {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('notesSection').style.display = 'block';
            document.getElementById('userName').textContent = currentUser.name;
            loadNotes();
        }

        function loadUserData() {
            const savedUser = localStorage.getItem('notesApp_currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
            }
        }

        // Notes functions
        function loadNotes() {
            const savedNotes = localStorage.getItem(`notesApp_notes_${currentUser.id}`);
            notes = savedNotes ? JSON.parse(savedNotes) : [];
            renderNotes();
        }

        function saveNotes() {
            localStorage.setItem(`notesApp_notes_${currentUser.id}`, JSON.stringify(notes));
        }

        function selectColor(color) {
            selectedColor = color;
            document.querySelectorAll('.color-option').forEach(option => {
                option.classList.remove('active');
            });
            document.querySelector(`[data-color="${color}"]`).classList.add('active');
        }

        function addNote() {
            const content = document.getElementById('noteInput').value.trim();
            
            if (!content) {
                alert('Please write something in your note');
                return;
            }

            if (editingNoteId) {
                // Update existing note
                const noteIndex = notes.findIndex(note => note.id === editingNoteId);
                if (noteIndex !== -1) {
                    notes[noteIndex].content = content;
                    notes[noteIndex].color = selectedColor;
                    notes[noteIndex].updatedAt = new Date().toISOString();
                }
                editingNoteId = null;
                document.querySelector('.btn-primary').innerHTML = '<i class="fas fa-plus"></i> Add Note';
            } else {
                // Add new note
                const newNote = {
                    id: Date.now().toString(),
                    content: content,
                    color: selectedColor,
                    pinned: false,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                notes.unshift(newNote);
            }

            document.getElementById('noteInput').value = '';
            selectColor('default');
            saveNotes();
            renderNotes();
        }

        function editNote(id) {
            const note = notes.find(n => n.id === id);
            if (note) {
                document.getElementById('noteInput').value = note.content;
                selectColor(note.color);
                editingNoteId = id;
                document.querySelector('.btn-primary').innerHTML = '<i class="fas fa-save"></i> Update Note';
                document.getElementById('noteInput').focus();
            }
        }

        function deleteNote(id) {
            if (confirm('Are you sure you want to delete this note?')) {
                notes = notes.filter(note => note.id !== id);
                saveNotes();
                renderNotes();
            }
        }

        function togglePin(id) {
            const note = notes.find(n => n.id === id);
            if (note) {
                note.pinned = !note.pinned;
                saveNotes();
                renderNotes();
            }
        }

        function renderNotes() {
            const container = document.getElementById('notesContainer');
            const emptyState = document.getElementById('emptyState');

            if (notes.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            container.style.display = 'grid';
            emptyState.style.display = 'none';

            // Sort notes: pinned first, then by updated date
            const sortedNotes = [...notes].sort((a, b) => {
                if (a.pinned && !b.pinned) return -1;
                if (!a.pinned && b.pinned) return 1;
                return new Date(b.updatedAt) - new Date(a.updatedAt);
            });

            container.innerHTML = sortedNotes.map(note => `
                <div class="note-card ${note.pinned ? 'pinned' : ''}" style="background-color: ${colorMap[note.color]}">
                    <div class="note-content">${note.content}</div>
                    <div class="note-actions">
                        <div class="note-date">
                            ${new Date(note.updatedAt).toLocaleDateString('en-IN')}
                        </div>
                        <div class="note-buttons">
                            <button class="note-btn" onclick="togglePin('${note.id}')" title="${note.pinned ? 'Unpin' : 'Pin'} note">
                                <i class="fas fa-thumbtack"></i>
                            </button>
                            <button class="note-btn" onclick="editNote('${note.id}')" title="Edit note">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="note-btn" onclick="deleteNote('${note.id}')" title="Delete note">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                addNote();
            }
        });
    </script>
</body>
</html>
